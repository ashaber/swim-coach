<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0e7c86">
  <meta name="description" content="Renee's training plan — read-only view of the swim-coach engine's plan for the current athlete.">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>swim-coach</title>
  <style>
    :root {
      --ground: #eef2f3; --paper: #ffffff; --paper-2: #f6f9fa;
      --ink: #10242b; --ink-soft: #47585f; --ink-faint: #74858c;
      --line: #dbe3e6; --line-soft: #e8eef0;
      --accent: #0e7c86; --accent-ink: #0a5960;
      --c-pool: #2f7ca6; --c-ow: #12907e; --c-strength: #c17d2e; --c-recovery: #74897f;
      --c-signal: #cf5142; --c-signal-wash: #fbeae8;
      --shadow: 0 1px 2px rgba(16,36,43,.06), 0 6px 20px rgba(16,36,43,.05);
      --radius: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ground:#0c1417; --paper:#131f24; --paper-2:#17262c;
        --ink:#e9f1f2; --ink-soft:#a7bac0; --ink-faint:#7c9198;
        --line:#24363d; --line-soft:#1d2d33; --accent:#2ab0ba; --accent-ink:#6fd3da;
        --c-pool:#57a8ce; --c-ow:#2fc2ab; --c-strength:#e0a45a; --c-recovery:#92a89d;
        --c-signal:#f0776a; --c-signal-wash:#2a1a18;
        --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.28);
      }
    }
    :root[data-theme="light"] {
      --ground:#eef2f3; --paper:#fff; --paper-2:#f6f9fa; --ink:#10242b; --ink-soft:#47585f;
      --ink-faint:#74858c; --line:#dbe3e6; --line-soft:#e8eef0; --accent:#0e7c86; --accent-ink:#0a5960;
      --c-pool:#2f7ca6; --c-ow:#12907e; --c-strength:#c17d2e; --c-recovery:#74897f;
      --c-signal:#cf5142; --c-signal-wash:#fbeae8;
      --shadow:0 1px 2px rgba(16,36,43,.06),0 6px 20px rgba(16,36,43,.05);
    }
    :root[data-theme="dark"] {
      --ground:#0c1417; --paper:#131f24; --paper-2:#17262c; --ink:#e9f1f2; --ink-soft:#a7bac0;
      --ink-faint:#7c9198; --line:#24363d; --line-soft:#1d2d33; --accent:#2ab0ba; --accent-ink:#6fd3da;
      --c-pool:#57a8ce; --c-ow:#2fc2ab; --c-strength:#e0a45a; --c-recovery:#92a89d;
      --c-signal:#f0776a; --c-signal-wash:#2a1a18;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--ground); }
    body { min-height: 100dvh; }
    .wrap {
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-family: var(--sans); color: var(--ink); background: var(--ground);
      line-height: 1.5; max-width: 1040px; margin: 0 auto;
      padding: clamp(18px,4vw,40px) clamp(16px,4vw,36px) 72px; -webkit-font-smoothing: antialiased;
    }
    .wrap :where(h1,h2,h3,p,ul){ margin: 0; }
    .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

    .mast { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between;
      gap: 20px; padding-bottom: 22px; border-bottom: 2px solid var(--line); }
    .mast .mark { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--accent);
      font-weight: 800; display: inline-flex; align-items: center; gap: 9px; }
    .mast .mark::before { content:""; width: 20px; height: 3px; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), transparent); }
    .mast h1 { font-size: clamp(30px,6vw,46px); line-height: 1.02; letter-spacing: -.02em;
      font-weight: 800; text-wrap: balance; margin-top: 10px; }
    .mast .sub { color: var(--ink-soft); margin-top: 8px; font-size: 15px; max-width: 60ch; }
    .count { text-align: right; background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px 20px; box-shadow: var(--shadow); min-width: 150px; }
    .count .n { font-size: 38px; font-weight: 800; letter-spacing: -.02em; color: var(--accent-ink); line-height: 1; }
    .count .l { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); margin-top: 6px; }
    .count .d { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }

    section { margin-top: 44px; }
    .s-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
    .s-head h2 { font-size: 20px; font-weight: 750; letter-spacing: -.01em; }
    .s-head .note { color: var(--ink-faint); font-size: 13px; margin-left: auto; text-align: right; }

    /* week */
    .week { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .week + .week { margin-top: 16px; }
    .week-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; padding: 16px 20px; border-bottom: 1px solid var(--line-soft); background: var(--paper-2); }
    .week-head h3 { font-size: 16px; font-weight: 750; }
    .week-head .focus { font-size: 13px; color: var(--ink-soft); }
    .week-head .vol { margin-left: auto; font-size: 13px; color: var(--ink-faint); }
    .week-head .vol b { color: var(--ink); font-weight: 700; }
    .rationale { padding: 14px 20px; font-size: 13px; color: var(--ink-soft); border-bottom: 1px solid var(--line-soft); background: color-mix(in srgb, var(--accent) 5%, var(--paper)); }
    .rationale b { color: var(--ink); }
    .days { display: grid; }
    .day-row { display: grid; grid-template-columns: 92px 1fr; gap: 14px; padding: 13px 20px; align-items: start; }
    .day-row + .day-row { border-top: 1px solid var(--line-soft); }
    .day-row.hi { background: var(--c-signal-wash); }
    .day-row.empty { color: var(--ink-faint); font-size: 13px; }
    .dlabel .dow { font-weight: 750; font-size: 12px; }
    .dlabel .date { color: var(--ink-faint); font-size: 12px; }
    .sess { display: flex; align-items: flex-start; gap: 11px; }
    .sess + .sess { margin-top: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 3px; margin-top: 6px; flex: none; }
    .sess .body { min-width: 0; }
    .sess .title { font-size: 14px; font-weight: 650; letter-spacing: -.01em; }
    .sess .meta { font-size: 12px; color: var(--ink-faint); margin-top: 1px; }
    .sess .meta .pill { color: var(--ink-soft); }
    .sess .desc { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }
    .sess.big .title { font-size: 15px; color: var(--c-signal); font-weight: 750; }
    .tag { display:inline-block; font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:999px; margin-left:8px; vertical-align:middle; color:#fff; background:var(--c-signal); }

    /* macro */
    .macro { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px 22px 16px; }
    .macro-scroll { overflow-x: auto; }
    .blocks { display: flex; gap: 6px; min-width: 560px; align-items: flex-end; height: 168px; }
    .block { position: relative; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; border-radius: 8px 8px 0 0; }
    .block .fill { border-radius: 8px 8px 0 0; background: linear-gradient(180deg, var(--accent), var(--accent-ink)); opacity: .16; width: 100%; }
    .block.is-now .fill { opacity: .32; }
    .block .cap { position: absolute; top: 10px; left: 12px; right: 12px; }
    .block .ph { font-size: 13px; font-weight: 750; text-transform: capitalize; letter-spacing: -.01em; }
    .block .vol { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .block .wk { font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
    .nowtag { display:inline-block; font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#fff; background:var(--accent); padding:2px 7px; border-radius:999px; margin-top:6px; }
    .block.race .rr { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; height:100%; border:2px dashed var(--c-signal); border-radius:8px; background:var(--c-signal-wash); }
    .block.race .rr .em { font-size:20px; }
    .block.race .rr .t { font-size:11px; font-weight:750; color:var(--c-signal); text-align:center; padding:0 6px; }
    .macro-note { margin-top:12px; color:var(--ink-faint); font-size:12px; }
    .ladder { margin-top:14px; padding-top:14px; border-top:1px solid var(--line-soft); display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-size:12.5px; color:var(--ink-soft); }
    .rung { display:inline-flex; align-items:center; gap:6px; background:var(--paper-2); border:1px solid var(--line); border-radius:999px; padding:4px 11px; font-weight:650; color:var(--ink); }
    .rung .k { font-family:var(--mono); color:var(--accent-ink); }
    .arrow { color:var(--ink-faint); }

    /* panels */
    .foot { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
    @media (max-width: 720px){ .foot { grid-template-columns: 1fr; } }
    .panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; }
    .panel h3 { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; margin-bottom: 12px; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; }
    .legend .li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
    .zones { display: grid; gap: 6px; }
    .zrow { display: grid; grid-template-columns: 34px 1fr auto; gap: 10px; align-items: center; font-size: 13px; }
    .zrow .z { font-weight: 750; color: var(--ink); }
    .zbar-track { background: var(--line-soft); border-radius: 4px; height: 8px; }
    .zbar { height: 8px; border-radius: 4px; background: linear-gradient(90deg, var(--c-recovery), var(--c-signal)); opacity:.85; }
    .zrow .p { color: var(--ink-soft); }

    .disc { margin-top: 22px; font-size: 12px; color: var(--ink-faint); text-align: center; line-height: 1.6; }
    .themebtn { position: fixed; top: 12px; right: 12px; z-index: 10; font-size:12px; font-weight:700;
      background: var(--paper); color: var(--ink-soft); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; cursor: pointer; box-shadow: var(--shadow); }
    .themebtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .offline-banner { display: none; background: var(--c-strength); color: #1a1206; font-size: 12.5px; font-weight: 700;
      text-align: center; padding: 6px 12px; }
    .offline-banner.show { display: block; }

    .loading, .load-error { padding: 60px 20px; text-align: center; color: var(--ink-faint); }
    .load-error { color: var(--c-signal); }

    @media (max-width: 560px) {
      .day-row { grid-template-columns: 64px 1fr; }
    }
  </style>
</head>
<body>
  <div id="offline-banner" class="offline-banner">Offline — showing last downloaded plan</div>
  <button class="themebtn" id="themebtn" type="button" aria-label="Toggle light or dark theme">◐ Theme</button>
  <div id="app">
    <div class="wrap"><div class="loading">Loading plan…</div></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
