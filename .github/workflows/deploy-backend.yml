# Manual (workflow_dispatch) deploy for the coach-chat backend to Cloud Run.
#
# Manual on purpose: this ships a new image and swaps production traffic to
# it, so it stays an explicit human trigger rather than firing on every push.
#
# WIF (Workload Identity Federation) auth is set up as of 2026-07-11 —
# GCP_WORKLOAD_IDENTITY_PROVIDER / GCP_SERVICE_ACCOUNT / GCP_PROJECT_ID repo
# secrets exist and this workflow authenticates with them.
#
# REAL PRODUCTION is the GCP project `open-swim-coach-ashaber` (project
# number 445273334913) — this is the project GCP_PROJECT_ID must point at,
# and the URL `web/src/settings.js` defaults to.
#
# `ashaber-open-brain` (project number 901329634103) hosts a STALE DUPLICATE
# `swim-coach-api` Cloud Run service with no DATABASE_URL secret and
# different env vars. It must NOT be targeted by this workflow — deploying
# against it would ship a backend with no database.
#
# The image is built and pushed tagged both with the commit SHA (for
# traceable rollbacks) and `latest` (the running service's spec pins
# `:latest` for manual `gcloud run deploy` from Andrew's machine, so this
# workflow keeps that tag current too). The Cloud Run deploy itself targets
# the SHA tag explicitly so each deploy is pinned to a specific, inspectable
# image rather than a floating tag.

name: Deploy backend

on:
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  ARTIFACT_REPO: swim-coach-repo
  IMAGE_NAME: api
  SERVICE_NAME: swim-coach-api
  SYNC_JOB_NAME: swim-coach-sync

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --min-instances=0 \
            --max-instances=2 \
            --allow-unauthenticated \
            --set-env-vars=CLAUDE_MODEL=claude-opus-4-8,ALLOWED_ORIGINS=https://ashaber.github.io,ATHLETES_DIR=/app/athletes,LIBRARY_DIR=/app/library,STORE_BACKEND=db \
            --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,API_TOKEN=API_TOKEN:latest,DATABASE_URL=DATABASE_URL:latest,INTERVALS_SYNC_CONFIG=intervals-sync-config:latest

      - name: Deploy sync job to Cloud Run
        # Keeps the intervals.icu auto-sync job (backend/app/sync.py, run on
        # a Cloud Scheduler cron -- see backend/README.md) on the same image
        # tag as the API service, every deploy. `continue-on-error` because
        # the job doesn't exist until Andrew runs its one-time `gcloud run
        # jobs create` (README setup) -- a fresh repo/environment shouldn't
        # fail this whole workflow just because that hasn't happened yet.
        continue-on-error: true
        run: |
          gcloud run jobs update ${{ env.SYNC_JOB_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
          || echo "::warning::${{ env.SYNC_JOB_NAME }} job update failed or the job doesn't exist yet -- see backend/README.md's one-time setup section"
