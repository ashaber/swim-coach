name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine (with dev extras)
        run: pip install -e "engine/[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v

      # TODO(Day 2): once engine/swim_coach/cli.py exists, add
      # `python -m swim_coach.cli validate --athlete <slug>` against the real
      # athlete tree so CI fails on invalid athlete data.
