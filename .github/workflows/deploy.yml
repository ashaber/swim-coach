name: Deploy

on:
  push:
    branches: [main]
    # Only deploy when something that affects the published site changes.
    # Engine-internal logic (adapt/load/plan/cli/zones) doesn't alter the
    # built artifact, so those merges no longer trigger a (no-op, sometimes
    # flaky) Pages deploy. Use the manual trigger below to force a redeploy.
    paths:
      - 'web/**'
      - 'athletes/**'
      - 'library/**'
      - 'scripts/export_plan_json.py'
      - 'engine/swim_coach/models.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install -e "engine/[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build (exports plan JSON, then vite build with the Pages base path)
        working-directory: web
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          # Google OAuth Client ID for Sign-In (public, not a secret -- see
          # web/src/identity.js). Set the `VITE_GOOGLE_CLIENT_ID` repository
          # *variable* (not secret) under Settings -> Secrets and variables ->
          # Actions -> Variables once registered at
          # https://console.cloud.google.com/apis/credentials. Falls back to
          # a clearly-labeled placeholder if unset, so the build still
          # succeeds -- Google Sign-In just won't work until this is set.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - uses: actions/deploy-pages@v4
        id: deployment
